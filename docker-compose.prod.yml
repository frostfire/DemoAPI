# Production-style stack for the hosted demo. On UbuntuWeb this is deployed to
# /opt/demoapi and run from the synced source; secrets come from a .env file
# (symlinked to env/production.env on the server), never from this file.
#
# The API publishes only on host loopback; the worker and database have no host
# ports and talk over the compose-internal network. Memory limits keep the
# demo from crowding the shared box.
name: demoapi

services:
  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    env_file: [.env]
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__CaseFlow: "Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
    ports:
      - "127.0.0.1:${API_PORT:-8093}:8080"
    depends_on:
      db:
        condition: service_healthy
    mem_limit: 512m

  worker:
    build:
      context: .
      target: worker
    restart: unless-stopped
    env_file: [.env]
    environment:
      DOTNET_ENVIRONMENT: Production
      ConnectionStrings__CaseFlow: "Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
    depends_on:
      db:
        condition: service_healthy
    mem_limit: 256m

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10
    mem_limit: 512m
